function setTheme(theme){if(theme==='dark'){html.setAttribute('data-theme','dark');themeBtn.textContent='☀️';localStorage.setItem(THEME_KEY,'dark')}else{html.removeAttribute('data-theme');themeBtn.textContent='🌙';localStorage.setItem(THEME_KEY,'light')}setCursor(theme)}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}
function createFalling(){const c=document.getElementById('fallContainer'),f=document.createDocumentFragment();for(let i=0;i<50;i++){const s=document.createElement('span');s.className='fall';s.textContent='LeoLee';const sz=Math.random()*14+10,l=Math.random()*100,d=Math.random()*14+4,dl=Math.random()*10;s.style.fontSize=sz+'px';s.style.left=l+'%';s.style.animationDuration=d+'s';s.style.animationDelay=dl+'s';s.style.opacity=(Math.random()*.3+.15).toFixed(2);f.appendChild(s)}c.appendChild(f)}
const ctx=document.getElementById('contextMenu'),menuCur=document.getElementById('menuCurrentUrl'),menuLeo=document.getElementById('menuLeoUrl');
function showCtx(e){e.preventDefault();let x=e.clientX,y=e.clientY;const w=200,h=100;if(x+w>innerWidth)x=innerWidth-w-10;if(y+h>innerHeight)y=innerHeight-h-10;if(x<10)x=10;if(y<10)y=10;ctx.style.left=x+'px';ctx.style.top=y+'px';ctx.classList.add('show')}
function hideCtx(){ctx.classList.remove('show')}
menuCur.addEventListener('click',function(){const u=getUrl();navigator.clipboard.writeText(u).catch(()=>{const i=document.createElement('input');i.value=u;document.body.appendChild(i);i.select();document.execCommand('copy');i.remove()});hideCtx()});
menuLeo.addEventListener('click',function(){window.open('https://www.leoi.org/mainweb','_blank');hideCtx()});
document.addEventListener('contextmenu',showCtx);
document.addEventListener('click',function(e){if(!ctx.contains(e.target))hideCtx()});
window.addEventListener('scroll',hideCtx);
function init(){
let storedTheme=localStorage.getItem(THEME_KEY);
if(storedTheme){setTheme(storedTheme)}else{setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}
let savedLang=localStorage.getItem(LANG_KEY);
if(!savedLang||!T[savedLang]){savedLang=detectLang();if(!T[savedLang])savedLang='en'}
render(savedLang);
updClock();setInterval(updClock,1000);
createFalling();
sel.addEventListener('change',function(e){const lang=this.value;if(T[lang])render(lang)});
themeBtn.addEventListener('click',toggleTheme);
window.addEventListener('hashchange',updUrl);window.addEventListener('popstate',updUrl);setInterval(updUrl,3000);
console.log('🚀 Domain parking loaded.');
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
